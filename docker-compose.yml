

# ============================================
# 深度学习模糊测试管理系统 - 基础设施配置
# 包含: MySQL 8.0, Milvus Standalone, Attu
# ============================================

services:
  # ============ MySQL 8.0 数据库 ============
  mysql:
    image: mysql:8.0
    container_name: fuzzing_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123456 # root 密码
      MYSQL_DATABASE: fuzzing_db # 自动创建数据库
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-sql:/docker-entrypoint-initdb.d # 可放置初始化 SQL
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - fuzzing_net
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123456" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============ Etcd (Milvus 元数据存储) ============
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: fuzzing_etcd
    restart: unless-stopped
    environment:
      - ALLOW_NONE_AUTHENTICATION=yes
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
      - ETCD_ADVERTISE_CLIENT_URLS=http://etcd:2379
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379
    volumes:
      - etcd_data:/bitnami/etcd
    networks:
      - fuzzing_net
    healthcheck:
      test: [ "CMD", "etcdctl", "endpoint", "health" ]
      interval: 30s
      timeout: 20s
      retries: 3

  # ============ MinIO (Milvus 对象存储) ============
  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: fuzzing_minio
    restart: unless-stopped
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "9001:9001" # MinIO Console
      - "9000:9000" # MinIO API
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    networks:
      - fuzzing_net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 30s
      timeout: 20s
      retries: 3

  # ============ Milvus Standalone ============
  milvus:
    image: milvusdb/milvus:v2.3.3
    container_name: fuzzing_milvus
    restart: unless-stopped
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    ports:
      - "19530:19530" # Milvus gRPC
      - "9091:9091" # Milvus 健康检查
    volumes:
      - milvus_data:/var/lib/milvus
    command: [ "milvus", "run", "standalone" ]
    networks:
      - fuzzing_net
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9091/healthz" ]
      interval: 30s
      timeout: 20s
      retries: 3

  # ============ Attu (Milvus 可视化管理) ============
  attu:
    image: zilliz/attu:v2.3.5
    container_name: fuzzing_attu
    restart: unless-stopped
    environment:
      MILVUS_URL: milvus:19530
    ports:
      - "8000:3000" # 映射到 8000 端口
    networks:
      - fuzzing_net
    depends_on:
      - milvus

# ============ 数据卷 ============
volumes:
  mysql_data:
    driver: local
  etcd_data:
    driver: local
  minio_data:
    driver: local
  milvus_data:
    driver: local

# ============ 网络配置 ============
networks:
  fuzzing_net:
    driver: bridge
    name: fuzzing_net

