server:
  port: 8080

spring:
  application:
    name: fuzzing-backend

  datasource:
    url: jdbc:mysql://localhost:3306/fuzzing_db?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none  # 不自动创建表，使用现有表
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

# Python Data Service configuration
python-service:
  url: http://localhost:5000

logging:
  level:
    com.fuzzing: DEBUG
    org.hibernate.SQL: DEBUG
